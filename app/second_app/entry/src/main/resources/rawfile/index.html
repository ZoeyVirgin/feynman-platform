<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebView交互测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            margin: 8px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .message-box {
            margin-top: 20px;
            padding: 15px;
            background: #f0f9ff;
            border-radius: 8px;
            border: 1px solid #bae6fd;
            min-height: 50px;
        }
        .message-box p {
            color: #0369a1;
            font-size: 14px;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            background: #f0fdf4;
            border-radius: 8px;
            font-size: 12px;
            color: #166534;
        }
        .bridge-status {
            margin-top: 10px;
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 4px;
        }
        .bridge-ok {
            background: #dcfce7;
            color: #166534;
        }
        .bridge-error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>WebView交互测试</h1>
        <p class="subtitle">测试鸿蒙原生与Web的双向通信</p>
        
        <div id="bridgeStatus" class="bridge-status bridge-error">
            HarmonyBridge: 检测中...
        </div>
        
        <div style="margin-top: 20px;">
            <button class="btn btn-primary" onclick="sendMessageToNative()">
                发送消息给原生应用
            </button>
        </div>
        
        <div style="margin-top: 10px;">
            <button class="btn btn-secondary" onclick="sendTestData()">
                发送测试数据
            </button>
        </div>
        
        <div class="message-box">
            <p id="messageDisplay">等待消息...</p>
        </div>
        
        <div class="status">
            <p>当前时间: <span id="currentTime"></span></p>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleString('zh-CN');
        }
        
        updateTime();
        setInterval(updateTime, 1000);
        
        function checkBridge() {
            const statusEl = document.getElementById('bridgeStatus');
            if (typeof HarmonyBridge !== 'undefined') {
                statusEl.textContent = 'HarmonyBridge: 已连接';
                statusEl.className = 'bridge-status bridge-ok';
            } else {
                statusEl.textContent = 'HarmonyBridge: 未连接';
                statusEl.className = 'bridge-status bridge-error';
            }
        }
        
        setTimeout(checkBridge, 500);
        
        function sendMessageToNative() {
            const message = 'Hello from Web! 时间: ' + new Date().toLocaleTimeString('zh-CN');
            if (typeof HarmonyBridge !== 'undefined') {
                HarmonyBridge.callNative(message);
                document.getElementById('messageDisplay').textContent = '已发送: ' + message;
            } else {
                alert('HarmonyBridge未定义，请确保在鸿蒙WebView中运行');
                document.getElementById('messageDisplay').textContent = '发送失败: HarmonyBridge未定义';
            }
        }
        
        function sendTestData() {
            const testData = JSON.stringify({
                type: 'test',
                timestamp: Date.now(),
                message: '测试数据包'
            });
            if (typeof HarmonyBridge !== 'undefined') {
                HarmonyBridge.callNative(testData);
                document.getElementById('messageDisplay').textContent = '已发送测试数据';
            } else {
                alert('HarmonyBridge未定义');
            }
        }
        
        function receiveFromNative(message) {
            document.getElementById('messageDisplay').textContent = '收到原生消息: ' + message;
        }
    </script>
</body>
</html>
